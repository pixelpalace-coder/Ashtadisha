<svg xmlns="http://www. ছাদে.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- 3D Gold Gradient for Top Right -->
    <linearGradient id="goldLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8842A" />
      <stop offset="50%" stop-color="#E8A952" />
      <stop offset="100%" stop-color="#FFDD99" />
    </linearGradient>
    
    <!-- 3D Dark Gradient for Bottom Left -->
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5A19" />
      <stop offset="100%" stop-color="#4A2E0C" />
    </linearGradient>
    
    <!-- Glowing core Center -->
    <radialGradient id="coreGlow">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#FFDD99" />
      <stop offset="100%" stop-color="#C8842A" />
    </radialGradient>
    
    <!-- Drop Shadow for 3D Floating Effect -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Base Circle to give it volume -->
  <circle cx="32" cy="32" r="28" fill="#1A181C" filter="url(#dropShadow)" />
  
  <!-- Compass Needle (North-East pointing to represent 7 sisters) -->
  <g filter="url(#dropShadow)">
    <path d="M32 6 L38 26 L58 32 L38 38 L32 58 L26 38 L6 32 L26 26 Z" fill="url(#goldLight)" />
    <!-- 3D Shadow Half of the needle -->
    <path d="M32 6 L32 32 L26 26 Z" fill="url(#goldDark)" />
    <path d="M32 58 L32 32 L38 38 Z" fill="url(#goldDark)" />
    <path d="M6 32 L32 32 L26 38 Z" fill="url(#goldDark)" />
    <path d="M58 32 L32 32 L38 26 Z" fill="url(#goldDark)" />
  </g>
  
  <!-- Glowing Center -->
  <circle cx="32" cy="32" r="6" fill="url(#coreGlow)" />
</svg>
