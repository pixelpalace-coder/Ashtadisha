<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Ashtadisha — Luxury Northeast India Tourism</title>
  <meta name="description" content="Manage your Northeast India travel bookings, view itineraries, and update your traveler profile.">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Hind:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body class="dashboard-page">
  <div class="custom-cursor"><div class="cursor-dot"></div><div class="cursor-ring"></div></div>

  <!-- ── Dashboard Sidebar ── -->
  <aside class="db-sidebar">
    <div class="db-logo-section">
      <a href="index.html" class="db-logo">
        <svg viewBox="0 0 40 40" width="32" height="32" fill="none"><path d="M20 0L22.8 15.2L38 20L22.8 24.8L20 40L17.2 24.8L2 20L17.2 15.2L20 0Z" fill="currentColor"/><circle cx="20" cy="20" r="3" fill="var(--color-accent)"/></svg>
        <span>ASHTADISHA</span>
      </a>
    </div>

    <div class="db-user-brief">
      <div class="db-avatar" id="dbAvatar">T</div>
      <div class="db-user-info">
        <h4 id="dbUserName">Loading...</h4>
        <p id="dbUserTier">Explorer</p>
      </div>
    </div>

    <nav class="db-nav">
      <button class="db-nav-btn active" data-tab="overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Overview
      </button>
      <button class="db-nav-btn" data-tab="trips">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        My Bookings
      </button>
      <button class="db-nav-btn" data-tab="explore">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        Explore More
      </button>
      <button class="db-nav-btn" data-tab="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Account Settings
      </button>
      <div class="db-nav-spacer"></div>
      <button class="db-nav-btn signout" id="sideSignOut">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Sign Out
      </button>
    </nav>
  </aside>

  <!-- ── Dashboard Main Content ── -->
  <main class="db-content">
    <header class="db-header">
      <div class="db-header-left">
        <h1 id="dbWelcome">Hello, Traveler</h1>
        <p>Planning your next journey to the North East?</p>
      </div>
      <div class="db-header-right">
        <button id="themeToggle" class="db-icon-btn">☀</button>
        <div class="db-header-profile" id="navUserChip">
          <div class="db-header-avatar" id="navAvatar">T</div>
        </div>
      </div>
    </header>

    <!-- ── Tab: Overview ── -->
    <section class="db-tab-panel active" id="tab-overview">
      <div class="db-stats-grid">
        <div class="db-stat-card">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
          <div class="stat-info"><h3>Upcoming</h3><p id="statUpcoming">0 Trips</p></div>
        </div>
        <div class="db-stat-card">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <div class="stat-info"><h3>Completed</h3><p id="statCompleted">0 Trips</p></div>
        </div>
        <div class="db-stat-card">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
          <div class="stat-info"><h3>Points</h3><p>Explorer</p></div>
        </div>
      </div>

      <div class="db-section-header">
        <h2>Recent Bookings</h2>
        <button class="text-btn" onclick="switchTab('trips')">View All →</button>
      </div>
      <div id="overviewBookings" class="db-grid">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- ── Tab: Trips ── -->
    <section class="db-tab-panel" id="tab-trips">
      <div class="db-section-header">
        <h2>My Journeys</h2>
      </div>
      <div id="tripsList" class="db-list">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- ── Tab: Explore ── -->
    <section class="db-tab-panel" id="tab-explore">
      <div class="db-section-header">
        <h2>Curated Experiences</h2>
        <p>Dynamic pricing fetched from our premium collection.</p>
      </div>
      <div id="exploreGrid" class="db-grid">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- ── Tab: Settings ── -->
    <section class="db-tab-panel" id="tab-settings">
      <div class="db-section-header">
        <h2>Account Settings</h2>
      </div>
      <form class="db-form card" id="settingsForm">
        <div class="form-grid">
          <div class="form-group">
            <label>Display Name</label>
            <input type="text" id="setName" placeholder="Full Name">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="setPhone" placeholder="+91 90000 00000">
          </div>
          <div class="form-group">
            <label>Primary City</label>
            <input type="text" id="setCity" placeholder="City">
          </div>
          <div class="form-group">
            <label>Profile Image URL</label>
            <input type="url" id="setPhoto" placeholder="https://...">
          </div>
        </div>
        <button type="submit" class="btn-primary">Update Profile</button>
        <p id="saveStatus" class="status-msg"></p>
      </form>
    </section>
  </main>

  <!-- ═══ Custom Modal Overlay for Checkout ═══ -->
  <div class="checkout-overlay" id="checkoutOverlay"></div>

  <!-- ═══ Initialization ═══ -->
  <script src="js/firebase.js"></script>
  <script src="js/payment.js"></script>
  <script src="js/booking-checkout.js"></script>

  <script>
    (function () {
      'use strict';

      let userUID = null;

      // 1. Auth Guard
      firebase.auth().onAuthStateChanged(async (user) => {
        if (!user) {
          window.location.href = 'index.html?login=1';
          return;
        }
        userUID = user.uid;
        initDashboard(user);
      });

      // 2. Dashboard Logic
      async function initDashboard(fbUser) {
        // Fetch full profile from Firestore (Source of Truth)
        const userDoc = await firebase.firestore().collection('users').doc(fbUser.uid).get();
        const userData = userDoc.exists ? userDoc.data() : {};
        const displayName = userData.name || fbUser.displayName || 'Traveler';
        const firstName = displayName.split(' ')[0];

        // Update UI
        document.getElementById('dbUserName').textContent = displayName;
        document.getElementById('dbWelcome').textContent = `Namaste, ${firstName}`;
        document.getElementById('dbAvatar').textContent = firstName[0].toUpperCase();
        document.getElementById('navAvatar').textContent = firstName[0].toUpperCase();
        
        // Populate inputs
        document.getElementById('setName').value = displayName;
        document.getElementById('setPhone').value = userData.phone || '';
        document.getElementById('setCity').value = userData.city || '';
        document.getElementById('setPhoto').value = userData.photoURL || '';

        // Load dynamic packages
        loadPackages();
        // Load bookings
        loadBookings();
      }

      async function loadPackages() {
        const grid = document.getElementById('exploreGrid');
        if (!grid) return;
        grid.innerHTML = '<div class="loader">Fetching experiences...</div>';
        
        const packages = await window.AshtaFirebase.getPackages();
        grid.innerHTML = '';
        
        Object.values(packages).forEach(pkg => {
          const card = `
            <div class="db-card">
              <div class="db-card-img" style="background-image:url('${pkg.image}')"></div>
              <div class="db-card-content">
                <h3>${pkg.name}</h3>
                <p>${pkg.duration}</p>
                <div class="db-card-footer">
                  <span class="price">₹${pkg.pricePerPerson.toLocaleString()}</span>
                  <button class="btn-primary btn-sm" onclick="window.AshtaCheckout.open('${pkg.id}')">Book</button>
                </div>
              </div>
            </div>`;
          grid.insertAdjacentHTML('beforeend', card);
        });
      }

      async function loadBookings() {
        const bookings = await window.AshtaFirebase.getUserBookings(userUID);
        const overviewGrid = document.getElementById('overviewBookings');
        const tripsList = document.getElementById('tripsList');
        
        document.getElementById('statUpcoming').textContent = `${bookings.filter(b => b.status === 'confirmed').length} Trips`;
        
        if (bookings.length === 0) {
          const empty = '<p class="empty">No bookings found yet. Start exploring the Seven Sisters!</p>';
          overviewGrid.innerHTML = empty;
          tripsList.innerHTML = empty;
          return;
        }

        overviewGrid.innerHTML = '';
        tripsList.innerHTML = '';

        bookings.forEach(b => {
          const item = `
            <div class="db-list-item">
              <div class="item-info">
                <h4>${b.packageName}</h4>
                <p>${b.bookingRef} · ${b.travelDate}</p>
              </div>
              <div class="item-status status-${b.status}">${b.status}</div>
              <div class="item-price">₹${b.totalAmount.toLocaleString()}</div>
            </div>`;
          
          if (overviewGrid.children.length < 3) overviewGrid.insertAdjacentHTML('beforeend', item);
          tripsList.insertAdjacentHTML('beforeend', item);
        });
      }

      // 3. Tab Switching
      window.switchTab = (tabId) => {
        document.querySelectorAll('.db-tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        document.querySelectorAll('.db-nav-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.tab === tabId);
        });
      };

      document.querySelectorAll('.db-nav-btn[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });

      // 4. Update Profile
      document.getElementById('settingsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const status = document.getElementById('saveStatus');
        status.textContent = 'Updating...';
        
        const data = {
          name: document.getElementById('setName').value.trim(),
          phone: document.getElementById('setPhone').value.trim(),
          city: document.getElementById('setCity').value.trim(),
          photoURL: document.getElementById('setPhoto').value.trim()
        };


      // ── Start ────────────────────────────────────────────
      initAuth();

      // Handle hash navigation (e.g. dashboard.html#my-trips)
      if (location.hash) {
        const tab = location.hash.replace('#', '');
        setTimeout(() => switchTab(tab), 500);
      }

    })();
  </script>

</body>
</html>
